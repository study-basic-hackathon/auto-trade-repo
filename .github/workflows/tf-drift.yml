name: Terraform ドリフト検知

on:
  # 毎日 9:00 JST（= 00:00 UTC）に定期実行
  schedule:
    - cron: "0 0 * * *"
  # GitHub Actions UI から手動実行可能
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC トークン取得に必要
      contents: read
      issues: write     # Issue 作成に必要

    steps:
      - uses: actions/checkout@v6

      - name: AWS OIDC 認証
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v4

      - name: terraform init
        working-directory: infra/terraform/envs/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: terraform plan（ドリフト検知）
        id: plan
        working-directory: infra/terraform/envs/prod
        # -detailed-exitcode: 差分あり=2, 差分なし=0, エラー=1
        # 差分あり(2)の場合もエラー扱いにしないため continue-on-error: true
        continue-on-error: true
        env:
          # tfvars の代わりに TF_VAR_* 環境変数で渡す
          # github.repository_owner はワークフロー実行リポジトリの所有者を自動取得する組み込みコンテキスト
          TF_VAR_github_org: ${{ github.repository_owner }}
          TF_VAR_nginx_image_uri: ${{ vars.NGINX_IMAGE_URI }}
          TF_VAR_api_image_uri: ${{ vars.API_IMAGE_URI }}
          TF_VAR_inference_image_uri: ${{ vars.INFERENCE_IMAGE_URI }}
          TF_VAR_tfstate_kms_key_id: ${{ vars.TF_STATE_KMS_KEY_ID }}
          TF_VAR_basic_auth_username: ${{ secrets.BASIC_AUTH_USERNAME }}
          TF_VAR_basic_auth_password: ${{ secrets.BASIC_AUTH_PASSWORD }}
        run: |
          terraform plan \
            -detailed-exitcode \
            -no-color \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: ドリフト検知時に Issue を作成
        if: steps.plan.outputs.exitcode == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN_OUTPUT=$(cat infra/terraform/envs/prod/plan_output.txt)
          # 出力が長すぎる場合に備えて末尾から 10000 文字に制限
          PLAN_TRIMMED=$(echo "$PLAN_OUTPUT" | tail -c 10000)

          gh issue create \
            --title "⚠️ Terraform ドリフト検知: $(date '+%Y-%m-%d')" \
            --label "terraform,drift" \
            --body "$(cat <<EOF
          ## Terraform ドリフトが検知されました

          実行日時: $(date '+%Y-%m-%d %H:%M:%S UTC')
          環境: prod
          トリガー: ${{ github.event_name }}

          ## terraform plan 出力

          \`\`\`
          ${PLAN_TRIMMED}
          \`\`\`

          ## 対応方法

          1. 上記の差分を確認する
          2. 意図しない変更であれば \`terraform apply\` で Terraform の状態に戻す
          3. 意図した変更であれば \`terraform import\` または tfstate を手動修正する
          EOF
          )"

      - name: plan エラー時に失敗させる
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "terraform plan がエラーで失敗しました"
          cat infra/terraform/envs/prod/plan_output.txt
          exit 1
