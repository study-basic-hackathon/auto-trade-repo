name: Terraform ドリフト検知

on:
  # 毎日 9:00 JST（= 00:00 UTC）に定期実行
  schedule:
    - cron: "0 0 * * *"
  # GitHub Actions UI から手動実行可能
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC トークン取得に必要
      contents: read
      issues: write     # Issue 作成に必要

    steps:
      # 実行元ブランチに関わらず main ブランチの Terraform コードでドリフト検知する
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: AWS OIDC 認証
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v4

      - name: terraform init
        working-directory: infra/terraform/envs/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: terraform plan（ドリフト検知）
        id: drift-check
        working-directory: infra/terraform/envs/prod
        continue-on-error: true
        env:
          # tfvars の代わりに TF_VAR_* 環境変数で渡す
          # github.repository_owner はワークフロー実行リポジトリの所有者を自動取得する組み込みコンテキスト
          TF_VAR_github_org: ${{ github.repository_owner }}
          TF_VAR_nginx_image_uri: ${{ vars.NGINX_IMAGE_URI }}
          TF_VAR_api_image_uri: ${{ vars.API_IMAGE_URI }}
          TF_VAR_inference_image_uri: ${{ vars.INFERENCE_IMAGE_URI }}
          TF_VAR_tfstate_kms_key_id: ${{ vars.TF_STATE_KMS_KEY_ID }}
          TF_VAR_basic_auth_username: ${{ secrets.BASIC_AUTH_USERNAME }}
          TF_VAR_basic_auth_password: ${{ secrets.BASIC_AUTH_PASSWORD }}
        run: terraform plan -no-color -detailed-exitcode

      - name: ドリフト検知時に Issue を作成
        if: steps.drift-check.outputs.exitcode == '2'
        working-directory: infra/terraform/envs/prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # シェルへの直接展開は特殊文字で壊れる可能性があるため env 経由で渡す
          PLAN_OUTPUT: ${{ steps.drift-check.outputs.stdout }}
        run: |
          # ラベルが存在しない場合は作成（既に存在する場合は無視）
          gh label create terraform --color "5319E7" --description "Terraform 関連" 2>/dev/null || true
          gh label create drift --color "D93F0B" --description "ドリフト検知" 2>/dev/null || true

          # plan 出力を末尾 10000 文字に制限
          PLAN_TRIMMED=$(printf '%s' "$PLAN_OUTPUT" | tail -c 10000)

          # Issue 本文をファイルに書き出す
          cat > issue_body.md <<EOF
          ## Terraform ドリフトが検知されました

          - 実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')
          - 環境: prod
          - トリガー: ${{ github.event_name }}
          - ワークフロー実行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## terraform plan 出力

          \`\`\`
          ${PLAN_TRIMMED}
          \`\`\`

          ## 対応方法

          1. 上記の差分を確認する
          2. 意図しない変更であれば \`terraform apply\` で Terraform の状態に戻す
          3. 意図した変更であれば \`terraform import\` または tfstate を手動修正する
          EOF

          # 既存の open な drift Issue があればコメント追記、なければ新規作成
          EXISTING_ISSUE=$(gh issue list --label drift --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_ISSUE" ]; then
            echo "既存の Issue #${EXISTING_ISSUE} にコメント追記します"
            gh issue comment "$EXISTING_ISSUE" --body-file issue_body.md
          else
            echo "新規 Issue を作成します"
            gh issue create \
              --title "⚠️ Terraform ドリフト検知: $(date '+%Y-%m-%d')" \
              --label "terraform,drift" \
              --body-file issue_body.md
          fi

      - name: plan エラー時に失敗させる
        if: steps.drift-check.outputs.exitcode == '1'
        env:
          PLAN_STDOUT: ${{ steps.drift-check.outputs.stdout }}
          PLAN_STDERR: ${{ steps.drift-check.outputs.stderr }}
        run: |
          echo "terraform plan がエラーで失敗しました"
          echo "stdout: '$PLAN_STDOUT'"
          echo "stderr: '$PLAN_STDERR'"
          echo "exitcode: '${{ steps.drift-check.outputs.exitcode }}'"
          exit 1
