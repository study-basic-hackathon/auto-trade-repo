services:
  api:
    build:
      context: .
      dockerfile: infra/docker/python/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload --reload-dir /api
    volumes:
      - ./api:/api
    ports:
      - "8080:8080" # テスト用にポートを開放しています
    environment:
      - ENDPOINT_URL=http://minio:9000
      - ACCESS_KEY=minioadmin
      - SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-auto-trade-repo-123456789012-ap-northeast-1-an}
    depends_on:
      - minio

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile
    ports:
      - "80:80"
    environment:
      - API_HOST=api
    volumes:
      - ./front:/var/www/html
      - ./infra/docker/nginx/default.conf.template:/etc/nginx/default.conf.template
    depends_on:
      - api

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3互換APIエンドポイント
      - "9001:9001"   # Webコンソール
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
