services:
  api:
    build:
      context: .
      dockerfile: infra/docker/python/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload --reload-dir /api
    volumes:
      - ./api:/api
    ports:
      - "8080:8080" # テスト用にポートを開放しています
    environment:
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-auto-trade-repo-123456789012-ap-northeast-1-an}
    depends_on:
      - minio

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./front:/var/www/html
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3互換APIエンドポイント
      - "9001:9001"   # Webコンソール
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
