services:
  api:
    build:
      context: .
      dockerfile: infra/docker/python/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload --reload-dir /api
    volumes:
      - ./api:/api
    ports:
      - "8080:8080" # テスト用にポートを開放しています

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./front:/var/www/html
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
